<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Sports Stats - Court Controller</title>
    <!-- Linking our external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Scoreboard -->
    <header>
        <h2>Elite Stats Academy Tracker</h2>
        <div class="scoreboard">
            <div>Home: <span id="home-score" class="score-box">0</span></div>
            <div>vs</div>
            <div>Away: <span class="score-box" style="color: #aaa;">0</span></div>
        </div>
    </header>

    <!-- Error/Undo Notification Overlay -->
    <div id="undo-banner">
        ⚠️ Tap to Undo Last Entry
    </div>

    <!-- Match Event Log Stream -->
    <div class="feed-container">
        <div class="feed-title">Live Match Log Stream</div>
        <div id="log-feed">
            <!-- Events get injected here dynamically by JavaScript -->
        </div>
    </div>

    <!-- Interactive Tap Controller Panel -->
    <div class="control-panel">
        <div id="workflow-title" class="section-title">STEP 1: Select Action</div>
        
        <!-- Action Grid Matrix (Step 1) -->
        <div id="action-grid" class="grid-layout">
            <button class="btn btn-action" data-action="Made 2pt" data-points="2">🏀 Made 2PT</button>
            <button class="btn btn-action" data-action="Made 3pt" data-points="3">🎯 Made 3PT</button>
            <button class="btn btn-action" data-action="Rebound" data-points="0">🛡️ Rebound</button>
            <button class="btn btn-action" data-action="Assist" data-points="0">🤝 Assist</button>
        </div>

        <!-- Active Player Roster Matrix (Step 2) -->
        <div id="player-grid" class="player-grid">
            <button class="btn btn-player" data-jersey="03">#03</button>
            <button class="btn btn-player" data-jersey="07">#07</button>
            <button class="btn btn-player" data-jersey="10">#10</button>
            <button class="btn btn-player" data-jersey="23">#23</button>
            <button class="btn btn-player" data-jersey="34">#34</button>
            <button class="btn btn-cancel" id="btn-back">❌ Back</button>
        </div>
    </div>

    <!-- Linking our external JavaScript logic -->
    <script src="app.js"></script>
</body>
</html>
